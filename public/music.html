<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موزیک بندرعباس - سرویس موسیقی محلی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00c569;
            --primary-dark: #00a858;
            --secondary: #ff6b35;
            --dark: #1a1a1a;
            --darker: #121212;
            --light: #f5f5f5;
            --gray: #a0a0a0;
            --gray-dark: #404040;
            --ocean: #1e90ff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--darker) 0%, #0a2e5c 100%);
            color: var(--light);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        header {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--gray-dark);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--ocean));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--ocean));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .location {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .hero {
            padding: 30px 0;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') no-repeat center center;
            background-size: cover;
            border-radius: 0 0 20px 20px;
            margin-bottom: 20px;
        }
        
        .hero h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(to right, var(--primary), var(--ocean));
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 197, 105, 0.3);
            transition: transform 0.3s;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
        }
        
        .section-title {
            font-size: 1.3rem;
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: var(--ocean);
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .category {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .category:hover {
            transform: translateY(-5px);
        }
        
        .category-icon {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--ocean);
        }
        
        .playlists {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            margin-bottom: 25px;
        }
        
        .playlist {
            min-width: 160px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .playlist-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        
        .playlist-info {
            padding: 12px;
        }
        
        .song {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .song-img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
        }
        
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-top: 1px solid var(--gray-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .player-btn {
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .player-btn.play-pause {
            background: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        footer {
            text-align: center;
            padding: 20px 0 80px;
            color: var(--gray);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="logo-text">موزیک بندرعباس</div>
                </div>
                <div class="location">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>بندرعباس</span>
                </div>
            </div>
        </div>
    </header>
    
    <section class="hero">
        <div class="container">
            <h1>گوش به آواز دریا</h1>
            <p>بهترین موسیقی‌های محلی و مدرن جنوب ایران</p>
            <a href="#" class="cta-button">شروع گوش دادن</a>
        </div>
    </section>
    
    <div class="container">
        <h2 class="section-title">
            <i class="fas fa-list"></i>
            دسته‌بندی‌ها
        </h2>
        <div class="categories">
            <div class="category">
                <div class="category-icon"><i class="fas fa-guitar"></i></div>
                <div>موسیقی بندری</div>
            </div>
            <div class="category">
                <div class="category-icon"><i class="fas fa-water"></i></div>
                <div>آهنگ‌های دریا</div>
            </div>
            <div class="category">
                <div class="category-icon"><i class="fas fa-compass"></i></div>
                <div>موسیقی جنوب</div>
            </div>
            <div class="category">
                <div class="category-icon"><i class="fas fa-fire"></i></div>
                <div>پاپ محلی</div>
            </div>
        </div>
        
        <h2 class="section-title">
            <i class="fas fa-music"></i>
            آهنگ‌های پیشنهادی
        </h2>
        <div class="songs">
            <div class="song">
                <img src="https://via.placeholder.com/50" class="song-img">
                <div class="song-info">
                    <div class="song-name">نوای دریا</div>
                    <div class="song-artist">حمید بندری</div>
                </div>
                <div>۳:۴۵</div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>موزیک بندرعباس © 2025</p>
    </footer>
    
    <div class="player">
        <div class="player-info">
            <img src="https://via.placeholder.com/50" class="player-img">
            <div>
                <div>نوای دریا</div>
                <div style="font-size: 0.8rem; color: var(--gray);">حمید بندری</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="player-btn"><i class="fas fa-step-backward"></i></button>
            <button class="player-btn play-pause"><i class="fas fa-play"></i></button>
            <button class="player-btn"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>
</body>
</html>

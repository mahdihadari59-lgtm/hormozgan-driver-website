<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hormozgan Driver Pro 🚗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:"Vazirmatn",sans-serif;}
body{
  height:100vh;
  background:radial-gradient(circle at top,#0c0c0c,#000);
  color:#00ff88;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
h1{font-size:2rem;margin-bottom:1rem;animation:fadeIn 2s forwards;}
h2{font-size:1rem;color:#888;animation:fadeIn 3s forwards;}
.btn{
  margin-top:2rem;
  background:#00ff88;
  color:#000;
  padding:12px 24px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 20px #00ff88;
}
.btn:hover{background:#00ffaa;transform:scale(1.05);}
.car{
  position:absolute;
  bottom:50px;
  left:-200px;
  font-size:3rem;
  animation:drive 6s linear infinite;
}
@keyframes drive{
  0%{left:-200px;}
  50%{left:calc(100% + 50px);}
  100%{left:-200px;}
}
footer{
  position:absolute;
  bottom:10px;
  font-size:12px;
  opacity:0.6;
  color:#ccc;
}
audio{
  width:80%;
  margin-top:20px;
  filter:drop-shadow(0 0 10px #00ff88);
  border-radius:10px;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<h1>🚖 Hormozgan Driver Pro</h1>
<h2>به سامانه هوشمند رانندگان خوش آمدید</h2>

<!-- 🎵 پلیر صوتی -->
<audio controls autoplay loop>
  <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Scott_Holmes_Music/Epic_Cinematic/Scott_Holmes_Music_-_Epic_Cinematic.mp3" type="audio/mpeg">
  مرورگر شما از پخش موزیک پشتیبانی نمی‌کند.
</audio>

<button class="btn" onclick="enterDashboard()">ورود به داشبورد</button>
<div class="car">🚗💨</div>
<footer>© 2025 Hormozgan Driver Pro | همه حقوق محفوظ است.</footer>

<script>
function enterDashboard(){
  alert('در حال ورود به داشبورد...');
  window.location.href='/dashboard.html';
}
</script>
</body>
</html>
